services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentsuite
      POSTGRES_USER: agentsuite
      POSTGRES_PASSWORD: agentsuite
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentsuite -d agentsuite"]
      interval: 10s
      timeout: 5s
      retries: 5

  payments:
    build:
      context: ./agent/payments
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: ./agent
    depends_on:
      postgres:
        condition: service_healthy
      payments:
        condition: service_healthy
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_FAST: ${OPENAI_MODEL_FAST:-gpt-4.1-mini}
      OPENAI_MODEL_REASONING: ${OPENAI_MODEL_REASONING:-gpt-4.1}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.1}
      DATABASE_URL: postgresql+psycopg://agentsuite:agentsuite@postgres:5432/agentsuite
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      DATABASE_AUTO_CREATE: "false"
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-agentsuite_session}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      BOOTSTRAP_COMPANY_ID: ${BOOTSTRAP_COMPANY_ID:-demo-company}
      BOOTSTRAP_COMPANY_NAME: ${BOOTSTRAP_COMPANY_NAME:-AgentSuite Demo Workspace}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-finance@company.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change-this-password}
      AGENT_CORS_ORIGINS: ${AGENT_CORS_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173}
      PAYMENTS_SERVICE_URL: http://payments:3001
    command: sh -c "alembic upgrade head && agentsuite-agent"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').getcode() == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AGENT_API_URL: ${VITE_AGENT_API_URL:-http://localhost:8000}
    depends_on:
      agent:
        condition: service_healthy
    ports:
      - "4173:4173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4173').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
